
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Groupitizing Six</title>
<style>
body {margin:0;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:Arial;}
.slide {width:1280px;height:720px;position:relative;border:1px solid #ccc;}
.dot {position:absolute;border-radius:50%;transform:translate(-50%,-50%);transition:all 1.4s ease-in-out;}
.controls {margin-top:15px;}
button {font-size:18px;padding:10px 20px;margin:0 10px;}
</style>
</head>
<body>

<div class="slide" id="slide"></div>

<div class="controls">
<button onclick="start()">Start</button>
<button onclick="pause()">Pause</button>
</div>

<script>
const slide=document.getElementById("slide");
const cx=640, cy=360;

let timer=null;

const dots=[];
for(let i=0;i<6;i++){
 let d=document.createElement("div");
 d.className="dot";
 slide.appendChild(d);
 dots.push(d);
}

function randomSmall(){
 return dots.map(()=>({
  x:100+Math.random()*1080,
  y:100+Math.random()*520,
  size:18,
  color:"black"
 }));
}

function line(groups,size){
 let within=size*1.3, between=size*3;
 let total=0;
 groups.forEach((g,i)=>{
  total+=g*size+(g-1)*within;
  if(i<groups.length-1) total+=between;
 });
 let x=(1280-total)/2+size/2;
 let pos=[];
 groups.forEach((g,gi)=>{
  for(let i=0;i<g;i++){
   pos.push({x:x,y:cy,size:size,color:"black"});
   x+=size+within;
  }
  if(gi<groups.length-1) x+=between;
 });
 return pos;
}

function triangle(size){
 return [
  {x:cx,y:cy-size*1.5,size:size,color:"black"},
  {x:cx-size,y:cy,size:size,color:"black"},
  {x:cx+size,y:cy,size:size,color:"black"},
  {x:cx-size*1.5,y:cy+size*1.5,size:size,color:"black"},
  {x:cx,y:cy+size*1.5,size:size,color:"black"},
  {x:cx+size*1.5,y:cy+size*1.5,size:size,color:"black"}
 ];
}

function apply(p){
 p.forEach((d,i)=>{
  dots[i].style.left=d.x+"px";
  dots[i].style.top=d.y+"px";
  dots[i].style.width=d.size+"px";
  dots[i].style.height=d.size+"px";
  dots[i].style.background=d.color;
 });
}

const steps=[
 ()=>randomSmall(),
 ()=>line([3,3],40),
 ()=>line([5,1],40),
 ()=>line([4,2],40),
 ()=>triangle(40)
];

let i=0;

function cycle(){
 apply(steps[i]());
 i=(i+1)%steps.length;
}

function start(){
 if(timer) return;
 cycle();
 timer=setInterval(cycle,3000);
}

function pause(){
 clearInterval(timer);
 timer=null;
}
</script>

</body>
</html>
