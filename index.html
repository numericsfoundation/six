
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dot Grouping Animation Large</title>
<style>
body {
  margin: 0;
  background: #f4f4f4;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial, sans-serif;
}
#stage {
  width: 1200px;
  height: 600px;
  background: white;
  border-radius: 16px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.18);
  position: relative;
  overflow: hidden;
}
.dot {
  width: 36px;
  height: 36px;
  background: black;
  border-radius: 50%;
  position: absolute;
  transition: left 1s ease, top 1s ease;
}
</style>
</head>
<body>

<div id="stage"></div>

<script>
const stage = document.getElementById("stage");
const dots = [];
const DOT_SIZE = 36;
const STAGE_W = 1200;
const STAGE_H = 600;

for (let i = 0; i < 6; i++) {
  const d = document.createElement("div");
  d.className = "dot";
  stage.appendChild(d);
  dots.push(d);
}

function setDots(positions) {
  positions.forEach((p, i) => {
    dots[i].style.left = p.x + "px";
    dots[i].style.top = p.y + "px";
  });
}

function generateRandomLayout() {
  const positions = [];
  const minDistance = 80;
  const padding = 100;

  while (positions.length < 6) {
    const x = Math.floor(Math.random() * (STAGE_W - 2 * padding - DOT_SIZE)) + padding;
    const y = Math.floor(Math.random() * (STAGE_H - 2 * padding - DOT_SIZE)) + padding;

    let ok = true;
    for (const p of positions) {
      const dx = x - p.x;
      const dy = y - p.y;
      if (Math.sqrt(dx * dx + dy * dy) < minDistance) {
        ok = false;
        break;
      }
    }
    if (ok) positions.push({ x, y });
  }

  return positions;
}

const randomLayout = generateRandomLayout();

// scaled positions (x2 from previous centered ~600x300)
const layouts = [
  randomLayout,

  // 3 + 3 line
  [
    {x:420,y:282},{x:480,y:282},{x:540,y:282},
    {x:660,y:282},{x:720,y:282},{x:780,y:282}
  ],

  // 5 + 1
  [
    {x:390,y:282},{x:450,y:282},{x:510,y:282},{x:570,y:282},{x:630,y:282},
    {x:750,y:282}
  ],

  // 4 + 2
  [
    {x:420,y:282},{x:480,y:282},{x:540,y:282},{x:600,y:282},
    {x:690,y:282},{x:750,y:282}
  ],

  // stacked 3 + 3
  [
    {x:510,y:202},{x:570,y:202},{x:630,y:202},
    {x:510,y:362},{x:570,y:362},{x:630,y:362}
  ],

  // triangles
  [
    {x:420,y:322},{x:480,y:222},{x:540,y:322},
    {x:660,y:322},{x:720,y:222},{x:780,y:322}
  ],

  // 5 square +1
  [
    {x:480,y:222},{x:540,y:222},{x:480,y:282},{x:540,y:282},
    {x:510,y:342},
    {x:690,y:282}
  ],

  // 4 square +2
  [
    {x:480,y:222},{x:540,y:222},{x:480,y:282},{x:540,y:282},
    {x:690,y:252},{x:750,y:312}
  ]
];

let step = 0;

function animate() {
  setDots(layouts[step]);
  step = (step + 1) % layouts.length;
}

setDots(randomLayout);

setTimeout(() => {
  step = 1;
  animate();
  setInterval(animate, 2400);
}, 1400);

</script>

</body>
</html>
